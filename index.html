<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gimnasios Cercanos</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black: #0e0e0e;
      --red: #e8272e;
      --red-dark: #b81e24;
      --white: #f5f5f0;
      --gray: #1c1c1c;
      --card-bg: #161616;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--black);
      color: var(--white);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 20px;
      background: var(--black);
      border-bottom: 2px solid var(--red);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 2px;
      color: var(--white);
    }

    header h1 span { color: var(--red); }

    #status {
      margin-left: auto;
      font-size: 0.78rem;
      color: #888;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    #status.loading { color: var(--red); animation: pulse 1s infinite; }
    #status.ok { color: #4caf50; }
    #status.error { color: #ff5555; }

    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #map {
      flex: 1;
      height: 100%;
      filter: grayscale(30%) contrast(1.05);
    }

    #sidebar {
      width: 280px;
      background: var(--card-bg);
      border-left: 2px solid #222;
      overflow-y: auto;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    #sidebar-header {
      padding: 14px 16px;
      background: var(--gray);
      border-bottom: 1px solid #2a2a2a;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 2px;
      color: #888;
    }

    #gym-list { flex: 1; }

    .gym-item {
      padding: 12px 16px;
      border-bottom: 1px solid #1e1e1e;
      cursor: pointer;
      transition: background 0.15s;
    }

    .gym-item:hover { background: #1e1e1e; }

    .gym-item .name {
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--white);
      margin-bottom: 3px;
      line-height: 1.3;
    }

    .gym-item .tag {
      font-size: 0.72rem;
      color: var(--red);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .gym-item .dist {
      font-size: 0.75rem;
      color: #666;
      margin-top: 2px;
    }

    #empty {
      padding: 24px 16px;
      color: #555;
      font-size: 0.82rem;
      text-align: center;
      display: none;
    }

    /* Custom popup */
    .leaflet-popup-content-wrapper {
      background: var(--black) !important;
      border: 1.5px solid var(--red) !important;
      border-radius: 4px !important;
      color: var(--white) !important;
      box-shadow: 0 4px 20px rgba(232,39,46,0.3) !important;
    }
    .leaflet-popup-tip { background: var(--red) !important; }
    .leaflet-popup-content { font-family: 'DM Sans', sans-serif; }
    .popup-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
    .popup-tag { font-size: 0.72rem; color: var(--red); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#e8272e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 4v16M18 4v16M2 9h20M2 15h20"/>
  </svg>
  <h1>GYMS <span>MAP</span></h1>
  <span id="status" class="loading">BUSCANDO UBICACIÓN...</span>
</header>

<div class="main">
  <div id="map"></div>
  <div id="sidebar">
    <div id="sidebar-header">GIMNASIOS CERCANOS</div>
    <div id="gym-list">
      <div id="empty">No se encontraron gimnasios en 2 km.</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  const statusEl = document.getElementById('status');
  const gymList  = document.getElementById('gym-list');
  const emptyEl  = document.getElementById('empty');

  // Dark tile layer
  const DARK_TILES = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';

  navigator.geolocation.getCurrentPosition(success, onError, { enableHighAccuracy: true });

  function success(pos) {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const map = L.map('map').setView([lat, lon], 14);
    L.tileLayer(DARK_TILES, {
      attribution: '&copy; OpenStreetMap &copy; CartoDB',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(map);

    // User marker
    const userIcon = L.divIcon({
      html: `<div style="width:14px;height:14px;background:#e8272e;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 3px rgba(232,39,46,0.4)"></div>`,
      iconSize: [14,14], iconAnchor: [7,7], className: ''
    });
    L.marker([lat, lon], { icon: userIcon }).addTo(map)
      .bindPopup('<div class="popup-name">📍 Estás aquí</div>').openPopup();

    // Gym icon
    const gymIcon = L.divIcon({
      html: `<div style="width:10px;height:10px;background:#e8272e;border-radius:50%;border:2px solid #fff;"></div>`,
      iconSize: [10,10], iconAnchor: [5,5], className: ''
    });

    statusEl.textContent = 'BUSCANDO GIMNASIOS...';

    const queries = [
      // Intento 1: Radio 100km con criterios principales
      `[out:json][timeout:25];(node["leisure"="fitness_centre"](around:100000,${lat},${lon});node["amenity"="gym"](around:100000,${lat},${lon});node["sport"="fitness"](around:100000,${lat},${lon});way["leisure"="fitness_centre"](around:100000,${lat},${lon});way["amenity"="gym"](around:100000,${lat},${lon}););out center;`,
    ];

    let queryIndex = 0;

    function fetchGyms() {
      if (queryIndex >= queries.length) {
        statusEl.className = 'error';
        statusEl.textContent = 'SIN RESULTADOS';
        emptyEl.style.display = 'block';
        return;
      }

      fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: queries[queryIndex++]
      })
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        if (!data.elements || data.elements.length === 0) {
          fetchGyms(); // Intenta con la siguiente query
          return;
        }

        const gyms = data.elements.map(el => {
          const glat = el.lat ?? el.center?.lat;
          const glon = el.lon ?? el.center?.lon;
          return { ...el, _lat: glat, _lon: glon };
        }).filter(g => g._lat && g._lon);

        if (gyms.length === 0) {
          fetchGyms(); // Intenta con la siguiente query
          return;
        }

        statusEl.className = 'ok';
        statusEl.textContent = `${gyms.length} GIMNASIO${gyms.length > 1 ? 'S' : ''} ENCONTRADO${gyms.length > 1 ? 'S' : ''}`;

        gyms.forEach(gym => {
          const name = gym.tags?.name || 'Gimnasio sin nombre';
          const type = getType(gym.tags);
          const dist = getDistance(lat, lon, gym._lat, gym._lon);

          // Marker
          const marker = L.marker([gym._lat, gym._lon], { icon: gymIcon }).addTo(map);
          marker.bindPopup(`
            <div class="popup-name">${name}</div>
            <div class="popup-tag">${type} · ${dist} m</div>
          `);

          // Sidebar item
          const item = document.createElement('div');
          item.className = 'gym-item';
          item.innerHTML = `
            <div class="name">${name}</div>
            <div class="tag">${type}</div>
            <div class="dist">${dist} m de distancia</div>
          `;
          item.addEventListener('click', () => {
            map.setView([gym._lat, gym._lon], 17);
            marker.openPopup();
          });
          gymList.appendChild(item);
        });
      })
      .catch(err => {
        console.error('Error en Overpass:', err);
        fetchGyms(); // Intenta con la siguiente query
      });
    }

    fetchGyms();
  }

  function onError() {
    statusEl.className = 'error';
    statusEl.textContent = 'UBICACIÓN NO DISPONIBLE';
    alert('No se pudo obtener tu ubicación. Asegúrate de permitir el acceso.');
  }

  function getType(tags) {
    if (!tags) return 'GIMNASIO';
    
    if (tags.name) {
      const name = tags.name.toLowerCase();
      if (name.includes('crossfit')) return 'CROSSFIT';
      if (name.includes('yoga')) return 'YOGA';
      if (name.includes('pilates')) return 'PILATES';
      if (name.includes('box')) return 'BOX';
    }
    
    if (tags.leisure === 'fitness_centre') return 'FITNESS CENTRE';
    if (tags.amenity === 'gym') return 'GYM';
    if (tags.sport === 'fitness') return 'FITNESS';
    if (tags.leisure === 'sports_centre' || tags.leisure === 'sport_centre') return 'SPORTS CENTRE';
    if (tags.building === 'gym') return 'GYM';
    if (tags.leisure === 'sports_hall') return 'SPORTS HALL';
    
    return 'GIMNASIO';
  }

  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
  }
</script>
</body>
</html>
